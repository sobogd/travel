# Reference nginx server block for travel.iq-factura.com
# Place on prod as /etc/nginx/sites-available/travel (symlink to sites-enabled),
# then: nginx -t && systemctl reload nginx
# TLS lines below are added automatically by: certbot --nginx -d travel.iq-factura.com

server {
    listen 80;
    server_name travel.iq-factura.com;

    # Next.js (travel) running under PM2 on port 8201
    location / {
        proxy_pass http://127.0.0.1:8201;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
